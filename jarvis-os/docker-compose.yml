version: "3.9"

services:
  # ─── INFRASTRUCTURE ──────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: jarvis-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-jarvis}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-jarvispassword}
      POSTGRES_DB: ${POSTGRES_DB:-jarvisdb}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-jarvis}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - jarvis-network

  redis:
    image: redis:7-alpine
    container_name: jarvis-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - jarvis-network

  chroma:
    image: chromadb/chroma:latest
    container_name: jarvis-chroma
    restart: unless-stopped
    volumes:
      - chroma_data:/chroma/chroma
    ports:
      - "8000:8000"
    environment:
      CHROMA_SERVER_AUTHN_CREDENTIALS: ${CHROMA_API_KEY:-}
      CHROMA_SERVER_AUTHN_PROVIDER: chromadb.auth.token_authn.TokenAuthenticationServerProvider
    networks:
      - jarvis-network

  # ─── APPLICATION SERVICES ────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
      target: ${NODE_ENV:-development}
    container_name: jarvis-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      DATABASE_URL: postgresql://${POSTGRES_USER:-jarvis}:${POSTGRES_PASSWORD:-jarvispassword}@postgres:5432/${POSTGRES_DB:-jarvisdb}
      REDIS_URL: redis://:${REDIS_PASSWORD:-}@redis:6379
      JWT_SECRET: ${JWT_SECRET}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      ELEVENLABS_API_KEY: ${ELEVENLABS_API_KEY}
      AI_SERVICE_URL: http://ai-service:8080
    ports:
      - "${API_PORT:-3001}:3001"
    volumes:
      - ./apps/api/src:/app/apps/api/src
    networks:
      - jarvis-network

  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
      target: ${NODE_ENV:-development}
    container_name: jarvis-web
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost:3001}
    ports:
      - "${WEB_PORT:-3000}:3000"
    volumes:
      - ./apps/web/src:/app/apps/web/src
      - ./apps/web/app:/app/apps/web/app
    networks:
      - jarvis-network

  ai-service:
    build:
      context: .
      dockerfile: docker/ai.Dockerfile
    container_name: jarvis-ai
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
      - chroma
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-jarvis}:${POSTGRES_PASSWORD:-jarvispassword}@postgres:5432/${POSTGRES_DB:-jarvisdb}
      REDIS_URL: redis://:${REDIS_PASSWORD:-}@redis:6379
      CHROMA_HOST: chroma
      CHROMA_PORT: 8000
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      ELEVENLABS_API_KEY: ${ELEVENLABS_API_KEY}
      PINECONE_API_KEY: ${PINECONE_API_KEY:-}
      SERPAPI_API_KEY: ${SERPAPI_API_KEY:-}
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
    ports:
      - "${AI_SERVICE_PORT:-8080}:8080"
    volumes:
      - ./services/ai:/app
      - ai_models:/root/.cache
    networks:
      - jarvis-network

  # ─── MONITORING (Optional) ───────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: jarvis-prometheus
    restart: unless-stopped
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - jarvis-network
    profiles:
      - monitoring

  grafana:
    image: grafana/grafana:latest
    container_name: jarvis-grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
    ports:
      - "3005:3000"
    networks:
      - jarvis-network
    profiles:
      - monitoring

volumes:
  postgres_data:
  redis_data:
  chroma_data:
  ai_models:
  prometheus_data:
  grafana_data:

networks:
  jarvis-network:
    driver: bridge
